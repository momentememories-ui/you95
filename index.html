<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart for you</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
            font-family: 'Prompt', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            cursor: pointer;
            touch-action: manipulation;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            bottom: 10%;
            z-index: 2;
            text-align: center;
            pointer-events: none;
            width: 100%;
            transition: opacity 0.5s ease;
        }
        .instruction {
            font-size: clamp(14px, 4vw, 18px);
            color: #ffb3c1;
            animation: fade 2s infinite;
            margin: 0;
        }
        @keyframes fade {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <canvas id="heart"></canvas>

    <div id="ui-layer">
        <p id="status-text" class="instruction">แตะหน้าจอเพื่อเล่นเพลง</p>
    </div>

    <audio id="bgMusic" src="song.mp3" loop></audio>

    <script>
        const canvas = document.getElementById("heart");
        const ctx = canvas.getContext("2d");
        const music = document.getElementById("bgMusic");
        const uiLayer = document.getElementById("ui-layer");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        let t = 0;

        function heartFunction(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            return {x, y};
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let scale = Math.min(canvas.width / 45, canvas.height / 55); 
            let centerX = canvas.width / 2;
            let centerY = canvas.height / 2;

            // แก้ไขตรงนี้: ปรับลบออก 25 พิกเซล เพื่อดึงให้โครงสร้างหัวใจขยับมาทางซ้ายให้อยู่ตรงกลางพอดี
            // (ถ้าลองรันแล้วยังรู้สึกว่าเบี้ยวซ้ายหรือขวาไปนิด สามารถปรับเลข 25 เพิ่มหรือลดได้ตามใจชอบเลยครับ)
            let heartCenterX = centerX - 25; 

            // 1. วาดข้อความ "Happy Anniversary" ตรงกลางหน้าจอเหมือนเดิม (ใช้ centerX)
            ctx.fillStyle = "#ffe5ec";
            ctx.font = "600 18px 'Prompt', sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            // บรรทัดที่ 1: Happy Anniversary
            ctx.fillText("Happy Anniversary", centerX, centerY - 12);
            // บรรทัดที่ 2: ～我们的一周年♡
            ctx.font = "300 16px 'Prompt', sans-serif";
            ctx.fillText("～我们的一周年♡", centerX, centerY + 12);

            // 2. วาดเส้นขอบหัวใจที่ขยับมาทางซ้ายแล้ว (ใช้ heartCenterX)
            ctx.fillStyle = "#ff8fa3";
            ctx.font = "bold 14px 'Prompt', sans-serif";

            for (let i = 0; i < 60; i++) {
                let angle = t + i * 0.2; 
                let pos = heartFunction(angle);

                let x = heartCenterX + pos.x * scale;
                let y = centerY + pos.y * scale;

                ctx.fillText("ฮันนี่♡น้ำพุ", x, y);
            }

            t += 0.005; 
            requestAnimationFrame(draw);
        }

        const playMusic = () => {
            music.play().then(() => {
                uiLayer.style.opacity = "0";
            }).catch(err => {
                console.log(err);
                uiLayer.style.display = "none";
            });
        };

        window.addEventListener('click', playMusic);
        window.addEventListener('touchstart', playMusic);

        // รอ font โหลดก่อนค่อยเริ่มวาด
        document.fonts.ready.then(() => {
            draw();
        });
    </script>
</body>
</html>
